<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/cup.jpg" type="image/x-icon">
    <title>Bluffers Cup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scoreboard">
        <h1 class="title">Bluffers Cup</h1>
        <h3 class="subtitle">Est. 2024</h3>
        <table id="winners-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Venue</th>
                    <th>Champion</th>
                </tr>
            </thead>
            <tbody>
                <!-- Winners will be inserted here by JavaScript -->
            </tbody>
        </table>
    </div>
    <div class="resultModal">
        <h2 id="modalVenue"></h2>
        <h3 id="modalDate"></h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Points</th>
                </tr>
            <tbody id="modalTable">
                <!-- Winners will be inserted here by JavaScript -->
            </tbody>
        </table>
        <button id="closeModalButton">Back</button>
    </div>

    <script>
        const closeModalButton = document.getElementById('closeModalButton');
        const resultModal = document.querySelector('.resultModal');
        const scoreboard = document.querySelector('.scoreboard');

        closeModalButton.addEventListener('click', () => {
            resultModal.style.display = 'none';
            scoreboard.style.display = 'block';
        });

        const hydrateModal = (data) => {
            const modalDate = document.getElementById('modalDate');
            const modalVenue = document.getElementById('modalVenue');
            const modalTable = document.getElementById('modalTable');
            modalDate.textContent = `${data.date}`;
            modalVenue.textContent = `${data.venue}`;
            modalTable.innerHTML = '';
            Object.keys(data).forEach(key => {
                if (key !== 'date' && key !== 'venue') {
                    const row = document.createElement('tr');
                    const nameCell = document.createElement('td');
                    const pointsCell = document.createElement('td');

                    nameCell.textContent = `${key}. ${data[key].name}`;
                    pointsCell.textContent = data[key].points;

                    row.appendChild(nameCell);
                    row.appendChild(pointsCell);
                    modalTable.appendChild(row);
                }
            });
            resultModal.style.display = 'flex';
            scoreboard.style.display = 'none';
        }

        async function loadWinners() {
            try {
                const response = await fetch('winners.json');
                const data = await response.json();

                const tableBody = document.querySelector('#winners-table tbody');
                tableBody.innerHTML = '';

                data.winners.forEach(winner => {
                    const row = document.createElement('tr');
                    const yearCell = document.createElement('td');
                    const venueCell = document.createElement('td');
                    const nameCell = document.createElement('td');

                    yearCell.textContent = winner.date;
                    venueCell.textContent = winner.venue;
                    nameCell.textContent = winner['1'].name;

                    row.appendChild(yearCell);
                    row.appendChild(venueCell);
                    row.appendChild(nameCell);
                    row.addEventListener('click', () => hydrateModal(winner));
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading winners:', error);
            }
        }

        window.onload = loadWinners;
    </script>
</body>
</html>
